<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>⚔️ TOWER DEFENSE | Arcade Strategy ⚔️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #0a1f1a 0%, #05100c 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Orbitron', 'Segoe UI', 'Courier New', monospace;
            padding: 20px;
        }

        .td-container {
            background: rgba(0, 15, 20, 0.75);
            backdrop-filter: blur(8px);
            border-radius: 48px;
            padding: 20px 25px 28px 25px;
            box-shadow: 0 30px 45px rgba(0, 0, 0, 0.6), inset 0 1px 2px rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(0, 200, 180, 0.5);
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 28px;
            box-shadow: 0 0 0 3px #2effcc55, 0 20px 35px rgba(0, 0, 0, 0.5);
            cursor: crosshair;
            background: #0c1e1b;
        }

        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 18px;
            margin-top: 20px;
            margin-bottom: 12px;
            background: rgba(0, 20, 25, 0.8);
            backdrop-filter: blur(12px);
            padding: 8px 28px;
            border-radius: 80px;
            border: 1px solid #2effcc88;
        }

        .stats {
            display: flex;
            gap: 28px;
        }

        .stat {
            display: flex;
            align-items: baseline;
            gap: 8px;
            background: #071c27b3;
            padding: 5px 20px;
            border-radius: 40px;
        }

        .stat-label {
            font-size: 0.75rem;
            letter-spacing: 2px;
            color: #aefffa;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 800;
            font-family: 'Orbitron', monospace;
            background: linear-gradient(135deg, #FFF6B0, #2effe6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .tower-badge {
            background: #2e5f4acc;
            padding: 5px 18px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.8rem;
            font-weight: bold;
            color: #ffefb0;
            backdrop-filter: blur(4px);
        }

        .restart-td {
            background: linear-gradient(145deg, #f5bc70, #e09d32);
            border: none;
            font-family: 'Orbitron', monospace;
            font-weight: bold;
            font-size: 0.85rem;
            padding: 6px 26px;
            border-radius: 40px;
            cursor: pointer;
            box-shadow: 0 4px 0 #7a4316;
            transition: 0.08s linear;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .restart-td:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #7a4316;
        }

        .instruction {
            font-size: 0.7rem;
            text-align: center;
            margin-top: 10px;
            color: #b3ffec;
            background: #00000070;
            padding: 5px 15px;
            border-radius: 60px;
            display: inline-block;
        }

        @media (max-width: 750px) {
            .td-container { padding: 12px 16px 18px; }
            .stat-value { font-size: 1.2rem; }
            .stat-label { font-size: 0.55rem; }
            .tower-badge { font-size: 0.6rem; padding: 3px 12px;}
            .restart-td { padding: 4px 16px; font-size: 0.7rem; }
        }
    </style>
</head>
<body>
<div>
    <div class="td-container">
        <canvas id="tdCanvas" width="900" height="550"></canvas>
        
        <div class="info-panel">
            <div class="stats">
                <div class="stat">
                    <span class="stat-label">💰 GOLD</span>
                    <span class="stat-value" id="goldAmount">100</span>
                </div>
                <div class="stat">
                    <span class="stat-label">❤️ LIVES</span>
                    <span class="stat-value" id="livesAmount">20</span>
                </div>
                <div class="stat">
                    <span class="stat-label">👾 KILLS</span>
                    <span class="stat-value" id="killCount">0</span>
                </div>
            </div>
            <div class="tower-badge">
                🗼 TOWER: 80G | click on path edges to build
            </div>
            <button class="restart-td" id="tdRestartBtn">⚔️ RESTART SIEGE ⚔️</button>
        </div>
        <div style="text-align: center;">
            <span class="instruction">✨ Click on GRASS (non-path) to place towers ✨ | Towers shoot nearest enemy ✨</span>
        </div>
    </div>
</div>

<script>
    (function(){
        // ---------- CANVAS ----------
        const canvas = document.getElementById('tdCanvas');
        const ctx = canvas.getContext('2d');
        
        const W = 900;
        const H = 550;
        
        // ---------- GAME STATE ----------
        let gameRunning = true;
        let animationId = null;
        let frame = 0;
        
        // resources - STARTING GOLD = 100 (updated as requested)
        let gold = 100;
        let lives = 20;
        let kills = 0;
        
        // tower cost
        const TOWER_COST = 80;
        
        // ---------- PATH DEFINITION (waypoints) ----------
        // path from left to right with curves
        const waypoints = [
            { x: 0, y: 180 },
            { x: 200, y: 180 },
            { x: 250, y: 230 },
            { x: 400, y: 230 },
            { x: 450, y: 280 },
            { x: 620, y: 280 },
            { x: 670, y: 340 },
            { x: 780, y: 340 },
            { x: 830, y: 390 },
            { x: 900, y: 390 }    // end point (escape)
        ];
        
        // ---------- ENEMIES ----------
        let enemies = [];
        let enemyId = 0;
        let spawnCounter = 0;
        let spawnDelay = 75;   // frames between spawns
        let waveLevel = 1;
        
        // enemy types - REWARD SET TO 10 GOLD for all (as requested)
        const ENEMY_TYPES = [
            { name: "grunt", radius: 12, health: 30, maxHealth: 30, speed: 1.3, color: "#d64531", reward: 10 },
            { name: "swift", radius: 10, health: 18, maxHealth: 18, speed: 2.0, color: "#ec9a3c", reward: 10 },
            { name: "tough", radius: 16, health: 65, maxHealth: 65, speed: 0.85, color: "#8b3c2c", reward: 10 }
        ];
        
        // ---------- TOWERS ----------
        let towers = [];
        let towerId = 0;
        const TOWER_RANGE = 90;
        const TOWER_COOLDOWN_MAX = 28;  // frames between shots
        const TOWER_DAMAGE = 18;
        
        // projectile effects
        let projectiles = [];
        
        // particle effects (death)
        let particles = [];
        
        // UI elements
        const goldSpan = document.getElementById('goldAmount');
        const livesSpan = document.getElementById('livesAmount');
        const killSpan = document.getElementById('killCount');
        
        function updateUI() {
            goldSpan.innerText = Math.floor(gold);
            livesSpan.innerText = lives;
            killSpan.innerText = kills;
        }
        
        // helper: check if point is on path (restrict tower placement)
        function isOnPath(x, y) {
            // check distance to any path segment
            for(let i = 0; i < waypoints.length - 1; i++) {
                const p1 = waypoints[i];
                const p2 = waypoints[i+1];
                const dist = pointToSegmentDistance(x, y, p1.x, p1.y, p2.x, p2.y);
                if(dist < 22) return true;
            }
            return false;
        }
        
        function pointToSegmentDistance(px, py, x1, y1, x2, y2) {
            const ax = px - x1;
            const ay = py - y1;
            const bx = x2 - x1;
            const by = y2 - y1;
            const dot = ax * bx + ay * by;
            const len2 = bx * bx + by * by;
            if(len2 === 0) return Math.hypot(ax, ay);
            let t = dot / len2;
            t = Math.max(0, Math.min(1, t));
            const projX = x1 + t * bx;
            const projY = y1 + t * by;
            return Math.hypot(px - projX, py - projY);
        }
        
        // add tower
        function tryPlaceTower(mouseX, mouseY) {
            if(!gameRunning) return false;
            // check not on path
            if(isOnPath(mouseX, mouseY)) return false;
            // check not overlapping existing towers
            for(let t of towers) {
                const dx = t.x - mouseX;
                const dy = t.y - mouseY;
                if(Math.hypot(dx, dy) < 25) return false;
            }
            if(gold >= TOWER_COST) {
                gold -= TOWER_COST;
                towers.push({
                    id: towerId++,
                    x: mouseX,
                    y: mouseY,
                    cooldown: 0,
                    range: TOWER_RANGE,
                    damage: TOWER_DAMAGE
                });
                updateUI();
                return true;
            }
            return false;
        }
        
        // enemy movement along path
        function updateEnemies() {
            for(let i=0; i<enemies.length; i++) {
                const e = enemies[i];
                if(e.currentTarget >= waypoints.length - 1) {
                    // reached end -> damage lives
                    lives -= e.health;
                    enemies.splice(i,1);
                    i--;
                    updateUI();
                    if(lives <= 0) {
                        gameRunning = false;
                        lives = 0;
                        updateUI();
                    }
                    continue;
                }
                const target = waypoints[e.currentTarget + 1];
                const dx = target.x - e.x;
                const dy = target.y - e.y;
                const distance = Math.hypot(dx, dy);
                if(distance < 3) {
                    // reached waypoint
                    e.currentTarget++;
                } else {
                    const step = Math.min(e.speed, distance);
                    const angle = Math.atan2(dy, dx);
                    e.x += Math.cos(angle) * step;
                    e.y += Math.sin(angle) * step;
                }
            }
        }
        
        // spawn enemies based on wave difficulty
        function trySpawnEnemy() {
            if(!gameRunning) return;
            if(spawnCounter <= 0) {
                // dynamic wave difficulty
                let typeIndex = 0;
                let rand = Math.random();
                if(waveLevel > 3 && rand < 0.4) typeIndex = 1;
                else if(waveLevel > 6 && rand < 0.3) typeIndex = 2;
                else if(rand < 0.6) typeIndex = 0;
                else typeIndex = 1;
                
                const enemyTemplate = ENEMY_TYPES[typeIndex];
                let healthBonus = Math.floor(waveLevel / 4);
                let extraHealth = Math.min(healthBonus * 3, 45);
                const newHealth = Math.min(enemyTemplate.maxHealth + extraHealth, enemyTemplate.maxHealth + 45);
                enemies.push({
                    id: enemyId++,
                    x: waypoints[0].x,
                    y: waypoints[0].y,
                    radius: enemyTemplate.radius,
                    health: newHealth,
                    maxHealth: newHealth,
                    speed: enemyTemplate.speed + (waveLevel * 0.02),
                    currentTarget: 0,
                    reward: 10,  // REWARD FIXED TO 10 GOLD as requested
                    color: enemyTemplate.color,
                    type: typeIndex
                });
                // dynamic spawn delay based on wave
                let delay = Math.max(28, 70 - Math.floor(waveLevel / 1.5));
                spawnCounter = delay + Math.floor(Math.random() * 20);
            } else {
                spawnCounter--;
            }
        }
        
        // tower shooting & projectiles
        function updateTowersAndProjectiles() {
            // update tower cooldowns
            for(let t of towers) {
                if(t.cooldown > 0) t.cooldown--;
            }
            
            // tower attack: find closest enemy in range
            for(let t of towers) {
                if(t.cooldown > 0) continue;
                let closest = null;
                let minDist = Infinity;
                for(let e of enemies) {
                    const dx = e.x - t.x;
                    const dy = e.y - t.y;
                    const dist = Math.hypot(dx, dy);
                    if(dist < t.range && dist < minDist) {
                        minDist = dist;
                        closest = e;
                    }
                }
                if(closest) {
                    t.cooldown = TOWER_COOLDOWN_MAX;
                    // add projectile
                    projectiles.push({
                        x: t.x,
                        y: t.y,
                        target: closest,
                        damage: t.damage,
                        active: true,
                        radius: 5
                    });
                }
            }
            
            // update projectiles
            for(let i=0; i<projectiles.length; i++) {
                const p = projectiles[i];
                if(!p.target || p.target.health <= 0) {
                    projectiles.splice(i,1);
                    i--;
                    continue;
                }
                const dx = p.target.x - p.x;
                const dy = p.target.y - p.y;
                const dist = Math.hypot(dx, dy);
                if(dist < 8) {
                    // hit!
                    p.target.health -= p.damage;
                    if(p.target.health <= 0) {
                        // kill enemy - reward is exactly 10 gold as set in enemy object
                        const idx = enemies.indexOf(p.target);
                        if(idx !== -1) {
                            gold += p.target.reward;  // reward = 10
                            kills++;
                            updateUI();
                            // death particles
                            for(let s=0; s<12; s++) {
                                particles.push({
                                    x: p.target.x,
                                    y: p.target.y,
                                    vx: (Math.random() - 0.5)*4,
                                    vy: (Math.random() - 0.5)*4 - 2,
                                    life: 0.8,
                                    size: Math.random()*4+2
                                });
                            }
                            enemies.splice(idx,1);
                        }
                    }
                    projectiles.splice(i,1);
                    i--;
                } else {
                    // move projectile toward target
                    const angle = Math.atan2(dy, dx);
                    const speed = 9;
                    p.x += Math.cos(angle) * speed;
                    p.y += Math.sin(angle) * speed;
                }
            }
        }
        
        // update wave difficulty based on kills
        function updateWave() {
            let newWave = 1 + Math.floor(kills / 8);
            if(newWave > waveLevel) {
                waveLevel = newWave;
            }
        }
        
        // particles update
        function updateParticles() {
            for(let i=0;i<particles.length;i++) {
                particles[i].x += particles[i].vx;
                particles[i].y += particles[i].vy;
                particles[i].vy += 0.2;
                particles[i].life -= 0.025;
                if(particles[i].life <= 0) {
                    particles.splice(i,1);
                    i--;
                }
            }
        }
        
        // ---------- DRAW EVERYTHING (vibrant tower defense style) ----------
        function drawBackground() {
            // grass
            ctx.fillStyle = "#1d5a3b";
            ctx.fillRect(0,0,W,H);
            // grid pattern
            ctx.strokeStyle = "#2e7d5077";
            ctx.lineWidth = 1;
            for(let i=0;i<W;i+=40){
                ctx.beginPath();
                ctx.moveTo(i,0);
                ctx.lineTo(i,H);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0,i%H);
                ctx.lineTo(W,i%H);
                ctx.stroke();
            }
        }
        
        function drawPath() {
            ctx.beginPath();
            ctx.moveTo(waypoints[0].x, waypoints[0].y);
            for(let i=1;i<waypoints.length;i++) {
                ctx.lineTo(waypoints[i].x, waypoints[i].y);
            }
            ctx.strokeStyle = "#c9a87b";
            ctx.lineWidth = 28;
            ctx.stroke();
            ctx.lineWidth = 24;
            ctx.strokeStyle = "#8b6946";
            ctx.stroke();
            ctx.lineWidth = 4;
            ctx.setLineDash([8,12]);
            ctx.strokeStyle = "#ffdfa5";
            ctx.stroke();
            ctx.setLineDash([]);
            // waypoint markers
            for(let wp of waypoints) {
                ctx.beginPath();
                ctx.arc(wp.x, wp.y, 6, 0, Math.PI*2);
                ctx.fillStyle = "#ffd966";
                ctx.fill();
                ctx.beginPath();
                ctx.arc(wp.x, wp.y, 3, 0, Math.PI*2);
                ctx.fillStyle = "#b47c2e";
                ctx.fill();
            }
        }
        
        function drawTowers() {
            for(let t of towers) {
                ctx.shadowBlur = 8;
                ctx.shadowColor = "#4effb5";
                ctx.fillStyle = "#3b8c6e";
                ctx.beginPath();
                ctx.rect(t.x-12, t.y-12, 24, 24);
                ctx.fill();
                ctx.fillStyle = "#5fbb8a";
                ctx.beginPath();
                ctx.rect(t.x-6, t.y-18, 12, 12);
                ctx.fill();
                ctx.fillStyle = "#ffcf4a";
                ctx.beginPath();
                ctx.arc(t.x, t.y-4, 5, 0, Math.PI*2);
                ctx.fill();
                // range indicator (semi)
                ctx.beginPath();
                ctx.arc(t.x, t.y, t.range, 0, Math.PI*2);
                ctx.strokeStyle = "#c8ffaa88";
                ctx.lineWidth = 1.5;
                ctx.stroke();
                ctx.shadowBlur = 0;
            }
        }
        
        function drawEnemies() {
            for(let e of enemies) {
                ctx.shadowBlur = 5;
                ctx.fillStyle = e.color;
                ctx.beginPath();
                ctx.arc(e.x, e.y, e.radius, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = "#111";
                ctx.font = "bold 12px monospace";
                ctx.fillText(`${Math.ceil(e.health)}`, e.x-10, e.y-8);
                // health bar
                const healthPercent = e.health / e.maxHealth;
                ctx.fillStyle = "#dd4444";
                ctx.fillRect(e.x-e.radius, e.y-e.radius-8, e.radius*2, 5);
                ctx.fillStyle = "#6aff6a";
                ctx.fillRect(e.x-e.radius, e.y-e.radius-8, e.radius*2 * healthPercent, 4);
                ctx.shadowBlur = 0;
            }
        }
        
        function drawProjectiles() {
            for(let p of projectiles) {
                ctx.beginPath();
                ctx.arc(p.x, p.y, 5, 0, Math.PI*2);
                ctx.fillStyle = "#ffd966";
                ctx.fill();
                ctx.beginPath();
                ctx.arc(p.x, p.y, 2, 0, Math.PI*2);
                ctx.fillStyle = "#ffaa33";
                ctx.fill();
            }
        }
        
        function drawParticles() {
            for(let p of particles) {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = "#ffaa66";
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }
        
        function drawUItext() {
            ctx.font = "bold 22px 'Orbitron'";
            ctx.fillStyle = "#f7f3c0";
            ctx.shadowBlur = 3;
            ctx.fillText(`WAVE ${waveLevel}`, 30, 55);
            ctx.font = "12px monospace";
            ctx.fillStyle = "#c5ffd9";
            ctx.fillText(`Tower Cost: ${TOWER_COST} gold`, 30, 95);
            ctx.fillStyle = "#f7c56e";
            ctx.fillText(`⚡ +10 gold per kill`, 30, 125);
            if(!gameRunning) {
                ctx.font = "bold 38px 'Orbitron'";
                ctx.fillStyle = "#ffd966";
                ctx.fillText("GAME OVER", W/2-110, H/2-50);
                ctx.font = "18px monospace";
                ctx.fillStyle = "#f0c48f";
                ctx.fillText("press RESTART to defend again", W/2-140, H/2+30);
            }
            ctx.shadowBlur = 0;
        }
        
        // ---------- CANVAS CLICK HANDLER (build towers) ----------
        function handleCanvasClick(e) {
            if(!gameRunning) return;
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let clientX, clientY;
            if(e.touches) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
                e.preventDefault();
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            let canvasX = (clientX - rect.left) * scaleX;
            let canvasY = (clientY - rect.top) * scaleY;
            canvasX = Math.min(Math.max(canvasX, 20), W-20);
            canvasY = Math.min(Math.max(canvasY, 20), H-20);
            tryPlaceTower(canvasX, canvasY);
        }
        
        // ---------- RESTART FUNCTION (starting gold = 100) ----------
        function restartGame() {
            gameRunning = true;
            gold = 100;      // Starting gold set to 100 as requested
            lives = 20;
            kills = 0;
            waveLevel = 1;
            enemies = [];
            towers = [];
            projectiles = [];
            particles = [];
            spawnCounter = 15;
            towerId = 0;
            enemyId = 0;
            updateUI();
        }
        
        // ---------- GAME LOOP ----------
        function gameUpdate() {
            if(gameRunning) {
                trySpawnEnemy();
                updateEnemies();
                updateTowersAndProjectiles();
                updateParticles();
                updateWave();
                // extra fail-safe: if lives <=0 stop
                if(lives <= 0) {
                    gameRunning = false;
                }
            } else {
                updateParticles();
            }
        }
        
        function draw() {
            drawBackground();
            drawPath();
            drawTowers();
            drawEnemies();
            drawProjectiles();
            drawParticles();
            drawUItext();
        }
        
        function animate() {
            gameUpdate();
            draw();
            animationId = requestAnimationFrame(animate);
        }
        
        // bind events
        function bindEvents() {
            canvas.addEventListener('click', handleCanvasClick);
            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                handleCanvasClick(e);
            });
            document.getElementById('tdRestartBtn').addEventListener('click', () => {
                restartGame();
            });
        }
        
        function init() {
            bindEvents();
            restartGame();
            animate();
        }
        
        init();
    })();
</script>
</body>
</html>
